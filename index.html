<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Lofi Clock</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Видео фон -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="comp 3.mov" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- Часы -->
  <div class="widget draggable" id="clockWidget">
    <div id="clock" class="time">--:--</div>
    <div id="date" class="date">Loading...</div>
    <div class="resize-handle"></div>
  </div>

  <!-- Погода -->
  <div class="widget draggable" id="weatherWidget">
    <div id="weather">--°C</div>
    <div class="resize-handle"></div>
  </div>

  <!-- Мини плеер -->
  <div class="widget draggable mini-player" id="playerWidget">
    <div id="track-title">Track</div>
    <div id="track-artist">Artist</div>
    <div class="controls">
      <button id="playBtn">▶</button>
      <button id="skipBtn">⏭</button>
    </div>
    <div class="resize-handle"></div>
  </div>

</body>
</html>
